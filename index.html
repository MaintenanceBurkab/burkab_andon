<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURKAB v5.3 — CANLI ANDON PANELİ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <style>

    /* ── GENEL ──────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f0f12;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      border-bottom: 3px solid #f5c400;
      background: linear-gradient(180deg, #0f0f12 0%, #16161a 100%);
      flex-shrink: 0;
    }
    .header-logo {
      font-size: 1.9rem;
      font-weight: 700;
      color: #f5c400;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .header-baslik {
      text-align: center;
    }
    .header-baslik h2 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 4px;
      color: #fff;
      margin: 0;
    }
    .header-baslik small {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 2px;
    }
    .saat-blok { text-align: right; }
    #andonSaat {
      color: #f5c400;
      font-size: 2.8rem;
      font-family: monospace;
      font-weight: 900;
      line-height: 1;
    }
    #andonTarih {
      font-size: 0.9rem;
      color: #aaa;
      font-family: monospace;
      margin-top: 4px;
    }

    /* ── BAĞLANTI DURUM MESAJI ───────────────────────────── */
    #baglantiDurum {
      display: none;
      background: #2a1a0a;
      border: 1px solid #e65100;
      color: #ff9800;
      text-align: center;
      padding: 6px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* ── ANA İÇERİK ─────────────────────────────────────── */
    .ana-icerik {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 14px 24px 0 24px;
      gap: 14px;
      overflow: hidden;
    }

    /* ── ÜRETİM METRİKLERİ (ÜST PANEL) ─────────────────── */
    .metrik-panel {
      background: #16161a;
      border: 2px solid #2a2a35;
      border-radius: 16px;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
    }
    .metrik-kutu {
      flex: 1;
      text-align: center;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .metrik-kutu:not(:last-child) {
      border-right: 1px solid #2a2a35;
    }
    .metrik-etiket {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .metrik-deger {
      font-size: 4.5rem;
      font-weight: 900;
      font-family: monospace;
      line-height: 1;
    }

    /* ── VERİMLİLİK PROGRESS BAR ─────────────────────────── */
    .verimlilik-bar-wrap {
      width: 100%;
      background: #2a2a35;
      border-radius: 6px;
      height: 10px;
      margin-top: 4px;
      overflow: hidden;
    }
    #verimlilikBar {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.8s ease, background-color 0.4s ease;
    }

    /* ── ALT PANEL (FİRE + DURUŞ) ────────────────────────── */
    .alt-panel {
      display: flex;
      gap: 14px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Fire kartı */
    .fire-kart {
      background: #16161a;
      border: 2px solid #2a2a35;
      border-radius: 16px;
      flex: 0 0 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      gap: 8px;
    }
    .fire-etiket {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    #toplamFire {
      font-size: 3rem;
      font-weight: 900;
      font-family: monospace;
      color: #f44336;
      line-height: 1;
    }

    /* Duruş paneli */
    .durus-kart {
      background: #16161a;
      border: 2px solid #2a2a35;
      border-radius: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .durus-kart.aktif-durus {
      border-color: #f44336;
      box-shadow: 0 0 20px rgba(244, 67, 54, 0.3);
    }
    .durus-baslik {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #2a2a35;
      flex-shrink: 0;
    }
    .durus-baslik-metin {
      font-size: 0.8rem;
      font-weight: 700;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    #aktifDurus {
      font-size: 1.4rem;
      font-weight: 900;
    }
    #durusListesi {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .durus-satir {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #1e1e24;
      border-radius: 10px;
      border-left: 4px solid #e65100;
      font-size: 1rem;
    }
    .durus-satir.text-success {
      border-left-color: #4caf50;
      color: #4caf50;
    }
    .durus-ikon { font-size: 1.2rem; flex-shrink: 0; }
    .durus-makine {
      font-weight: 800;
      color: #f5c400;
      font-family: monospace;
      white-space: nowrap;
    }
    .durus-ayrac { color: #555; }
    .durus-neden { flex: 1; color: #eee; }
    .durus-saat {
      font-size: 0.85rem;
      color: #888;
      font-family: monospace;
      white-space: nowrap;
    }
    #durusListesi::-webkit-scrollbar { width: 4px; }
    #durusListesi::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Son güncelleme */
    #sonGuncelleme {
      font-size: 0.75rem;
      color: #555;
      padding: 6px 20px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── KAYAN DUYURU ALANI ───────────────────────────────── */
    .duyuru-container {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #f5c400;
      color: #0f0f12;
      padding: 9px 0;
      overflow: hidden;
      white-space: nowrap;
      font-weight: 800;
      font-size: 1.25rem;
      z-index: 100;
      flex-shrink: 0;
    }
    .duyuru-icerik {
      display: inline-block;
      padding-left: 100%;
      animation: kayan 40s linear infinite;
    }
    @keyframes kayan {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    /* ── ANIMASYONLAR ─────────────────────────────────────── */
    @keyframes yanipSonme {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-height: 600px) {
      .metrik-deger { font-size: 3rem; }
      #andonSaat { font-size: 2rem; }
      .header-container { padding: 10px 24px; }
      .metrik-kutu { padding: 12px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <div class="header-container">
    <div class="header-logo">BURKAB A.Ş.</div>
    <div class="header-baslik">
      <h2>CANLI ÜRETİM TAKİP PANELİ</h2>
      <small>ANLİK VERİLER — OTOMATİK YENİLENİR</small>
    </div>
    <div class="saat-blok">
      <div id="andonSaat">00:00:00</div>
      <div id="andonTarih">-- --- ----</div>
    </div>
  </div>

  <!-- ── BAĞLANTI DURUM MESAJI ──────────────────────────── -->
  <div id="baglantiDurum"></div>

  <!-- ── ANA İÇERİK ────────────────────────────────────── -->
  <div class="ana-icerik">

    <!-- Üretim Metrikleri -->
    <div class="metrik-panel">

      <div class="metrik-kutu">
        <div class="metrik-etiket">🎯 Vardiya Hedefi</div>
        <div id="toplamHedef" class="metrik-deger text-info">—</div>
      </div>

      <div class="metrik-kutu">
        <div class="metrik-etiket">📦 Gerçekleşen</div>
        <div id="toplamGerceklesen" class="metrik-deger text-white">—</div>
      </div>

      <div class="metrik-kutu" style="flex: 1.4;">
        <div class="metrik-etiket">📊 Anlık Verimlilik</div>
        <div id="verimlilikYuzde" class="metrik-deger text-success">%—</div>
        <!-- ✅ VERİMLİLİK BAR — andon.js bu ID'ye yazar -->
        <div class="verimlilik-bar-wrap" style="width:80%;max-width:300px;">
          <div id="verimlilikBar" class="bg-success"></div>
        </div>
      </div>

    </div>

    <!-- Alt Panel: Fire + Duruş -->
    <div class="alt-panel" style="padding-bottom: 54px;">

      <!-- Fire Kartı -->
      <div class="fire-kart">
        <div class="fire-etiket">🔥 Toplam Fire</div>
        <div id="toplamFire">— Adet</div>
        <div style="font-size:0.75rem;color:#555;margin-top:4px;">Bugün</div>
      </div>

      <!-- ✅ DURUŞ PANELİ — andon.js buraya yazar -->
      <div class="durus-kart" id="durusPaneli">
        <div class="durus-baslik">
          <span class="durus-baslik-metin">⏱️ Aktif Duruşlar</span>
          <span id="aktifDurus" class="text-success fw-bold">—</span>
        </div>
        <!-- ✅ durusListesi — duruş satırları buraya eklenir -->
        <div id="durusListesi">
          <div class="durus-satir text-muted" style="border-left-color:#555;color:#666;">
            Veri bekleniyor...
          </div>
        </div>
        <div id="sonGuncelleme">—</div>
      </div>

    </div>
  </div><!-- /ana-icerik -->

  <!-- ✅ KAYAN DUYURU ALANI ─────────────────────────────── -->
  <div class="duyuru-container">
    <div id="duyuruAlani" class="duyuru-icerik">
      BURKAB A.Ş. — Üretim Yönetim Sistemi yükleniyor...
    </div>
  </div>

  <!-- ── SCRIPT ─────────────────────────────────────────── -->
  <script src="andon.js"></script>

</body>
</html>
