<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURKAB v5.3 - CANLI ANDON</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0f0f12; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
    .card-andon { background-color: #16161a; border: 2px solid #2a2a35; border-radius: 20px; }
    .huge-number { font-size: 8rem; font-weight: 900; font-family: monospace; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 75vh; padding: 20px; }
  </style>
</head>
<body class="p-4">

  <div class="d-flex justify-content-between align-items-center mb-4 px-3">
    <div class="text-start">
      <h1 id="andonTarih" style="color: #f5c400; font-size: 4rem; font-family: monospace;">24.06.2026</h1>
      <small class="text-muted text-uppercase fw-bold">Tarih</small>
    </div>
    <div class="text-end">
      <h1 id="andonSaat" style="color: #f5c400; font-size: 4rem; font-family: monospace;">00:00:00</h1>
      <small class="text-muted text-uppercase fw-bold">Saat</small>
    </div>
  </div>

  <div class="main-grid">
    <div class="d-flex flex-column gap-3">
      <div class="card-andon p-5 flex-fill text-center d-flex flex-column justify-content-center">
        <h3 class="text-muted text-uppercase">🎯 Vardiya Hedefi</h3>
        <div id="toplamHedef" class="huge-number text-info">0</div>
      </div>
      <div class="card-andon p-5 flex-fill text-center d-flex flex-column justify-content-center">
        <h3 class="text-muted text-uppercase">📦 Gerçekleşen</h3>
        <div id="toplamGerceklesen" class="huge-number text-success">0</div>
      </div>
    </div>

    <div class="card-andon p-5 d-flex flex-column justify-content-center text-center">
      <h3 class="text-muted text-uppercase">📊 Anlık Verimlilik</h3>
      <div id="verimlilikYuzde" class="huge-number" style="font-size: 10rem; color: #198754;">%0</div>
      <div class="progress mt-4" style="height: 50px;"><div id="verimlilikBar" class="progress-bar bg-success" style="width: 0%"></div></div>
      
      <div class="row mt-5">
        <div class="col-6">
          <h4 class="text-muted">Toplam Fire</h4>
          <h2 id="toplamFire" class="text-danger fw-bold">0 Adet</h2>
        </div>
        <div class="col-6">
          <h4 class="text-muted">Aktif Duruş</h4>
          <h2 id="aktifDurus" class="text-success fw-bold">YOK</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="card-andon p-3 d-flex align-items-center mx-3">
    <span class="badge bg-danger p-3 me-4">CANLI AKIŞ</span>
    <marquee id="arizaKaydirici" class="fs-2 fw-bold text-light">Sistem beklemede...</marquee>
  </div>

<script src="andon.js"></script>
</body>
</html>
