<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURKAB v5.3 - CANLI ANDON PANELİ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0f0f12; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    .card-andon { background-color: #16161a; border: 1px solid #2a2a35; border-radius: 15px; }
    .huge-number { font-size: 5rem; font-weight: 800; font-family: monospace; }
    .efficiency-text { font-size: 6rem; font-weight: 900; font-family: monospace; }
    .progress { background-color: #2a2a35; height: 40px; border-radius: 10px; }
    .blink-red { animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { opacity: 0.3; } }
  </style>
</head>
<body class="p-4">

  <div class="row align-items-center mb-4">
    <div class="col-md-8">
      <h2 class="fw-bold">⚙️ BURKAB CANLI ÜRETİM TAKİP PANOSU</h2>
      <small class="text-muted">v5.3 MES Real-Time Veri Yayını</small>
    </div>
    <div class="col-md-4 text-end">
      <h2 id="andonSaat" class="m-0" style="font-size: 3rem; color: #f5c400;">00:00:00</h2>
      <small id="andonTarih" class="text-muted fs-5">24.06.2026</small>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-md-6">
      <div class="card-andon p-4 mb-4 text-center shadow">
        <h3 class="text-muted fw-bold text-uppercase">🎯 Hedef</h3>
        <div id="toplamHedef" class="huge-number text-info">0</div>
      </div>
      <div class="card-andon p-4 text-center shadow">
        <h3 class="text-muted fw-bold text-uppercase">📦 Gerçekleşen</h3>
        <div id="toplamGerceklesen" class="huge-number text-success">0</div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card-andon p-4 h-100 d-flex flex-column justify-content-center text-center shadow">
        <h3 class="text-muted fw-bold text-uppercase">📊 Anlık Verimlilik</h3>
        <div id="verimlilikYuzde" class="efficiency-text text-success">%0</div>
        <div class="progress mt-2"><div id="verimlilikBar" class="progress-bar bg-success" style="width: 0%"></div></div>
        
        <div class="mt-5 row">
          <div class="col-6"><h5 class="text-muted">Toplam Fire</h5><h3 id="toplamFire" class="text-danger fw-bold">0 Adet</h3></div>
          <div class="col-6"><h5 class="text-muted">Aktif Duruş</h5><h3 id="aktifDurus" class="text-success fw-bold">YOK</h3></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-12">
      <div class="card-andon p-3 d-flex align-items-center">
        <span class="badge bg-danger p-2 me-3 blink-red">CANLI AKIŞ</span>
        <marquee id="arizaKaydirici" behavior="scroll" direction="left" class="text-light fs-5 fw-bold">
          💚 Tüm hatlar sorunsuz çalışıyor.
        </marquee>
      </div>
    </div>
  </div>

<script src="andon.js"></script>
</body>
</html>
