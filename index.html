<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BURKAB v5.3 - CANLI ANDON</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0f0f12; color: #ffffff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
    .card-andon { background-color: #16161a; border: 2px solid #2a2a35; border-radius: 20px; }
    .huge-number { font-size: 7rem; font-weight: 900; font-family: monospace; }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 3px solid #f5c400;
    }
  </style>
</head>
<body class="p-0">

  <div class="header-container">
    <div class="text-start" style="width: 250px;">
      <h1 id="andonTarih" style="color: #f5c400; font-size: 3rem; font-family: monospace; margin: 0;">24.06.2026</h1>
    </div>

    <div class="text-center">
      <h2 class="text-white fw-bold" style="letter-spacing: 2px;">BURKAB A.Ş. ANLIK ÜRETİM VERİLERİ</h2>
    </div>

    <div class="text-end" style="width: 250px;">
      <h1 id="andonSaat" style="color: #f5c400; font-size: 3rem; font-family: monospace; margin: 0;">00:00:00</h1>
    </div>
  </div>

  <div class="container-fluid p-4">
    <div class="row g-4">
      <div class="col-6">
        <div class="card-andon p-4 mb-4 text-center">
            <h3 class="text-muted text-uppercase">🎯 Vardiya Hedefi</h3>
            <div id="toplamHedef" class="huge-number text-info">0</div>
        </div>
        <div class="card-andon p-4 text-center">
            <h3 class="text-muted text-uppercase">📦 Gerçekleşen</h3>
            <div id="toplamGerceklesen" class="huge-number text-success">0</div>
        </div>
      </div>

      <div class="col-6">
        <div class="card-andon p-4 h-100 text-center">
            <h3 class="text-muted text-uppercase">📊 Anlık Verimlilik</h3>
            <div id="verimlilikYuzde" class="huge-number" style="font-size: 8rem; color: #198754;">%0</div>
            <div class="progress mt-3" style="height: 40px;"><div id="verimlilikBar" class="progress-bar bg-success" style="width: 0%"></div></div>
            <div class="row mt-5">
                <div class="col-6"><h5>Toplam Fire</h5><h2 id="toplamFire" class="text-danger fw-bold">0 Adet</h2></div>
                <div class="col-6"><h5>Aktif Duruş</h5><h2 id="aktifDurus" class="text-success fw-bold">YOK</h2></div>
            </div>
        </div>
      </div>
    </div>
  </div>

<script src="andon.js"></script>
</body>
</html>
